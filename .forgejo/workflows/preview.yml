name: preview
# Per-app PR previews from tested images: only the app(s) a PR changes get
# built (natively on the `mac` runner — warm pnpm/turbo caches), pushed as
# registry.openape.ai/<app>:pr-<n> and deployed by Coolify at
# https://<app>-pr-<n>.preview.openape.ai. Closed PRs tear their previews
# down. See scripts/preview-dispatch.mjs for the mechanics.
#
# If the mac runner is offline the job just queues — ci/e2e (chatty) are
# unaffected, only the preview is delayed.
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.ref }}

jobs:
  dispatch:
    runs-on: mac
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure base ref for the diff
        if: github.event.action != 'closed'
        run: git fetch --no-tags origin ${{ github.base_ref }}
      - name: Build + deploy per-app previews
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          TURBO_CACHE_DIR: /Users/patrickhofmann/.cache/turbo-openape-ci
        run: node scripts/preview-dispatch.mjs
