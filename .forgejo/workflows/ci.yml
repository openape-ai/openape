name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint · Typecheck · Test
        # e2e needs a running stack (dedicated job); docs prerenders OG images
        # (fragile, own deploy) — both excluded from per-PR CI.
        run: pnpm turbo run lint typecheck test --filter='!openape-e2e' --filter='!docs'
      - name: Build
        # Separate wave: nuxt build regenerates .nuxt/tsconfig.json, which races
        # a concurrent nuxi prepare from typecheck/test → TSConfckParseError.
        # Running build alone removes the concurrent writer.
        #
        # --concurrency=1: the runner is a 4-core box. turbo's default fan-out
        # builds several Nuxt apps at once, each spawning its own vite workers, so
        # load spikes past 15 (≈4× oversubscription) and a build worker gets
        # SIGHUP'd mid-build (exit 129) — the flaky failure that hit several PRs.
        # Serial app builds keep each one within the 4 cores: slower, but it stops
        # thrashing the runner. (A same-shell retry can't help — the SIGHUP hits
        # the step's shell too.)
        run: pnpm turbo run build --filter='!openape-e2e' --filter='!docs' --concurrency=1
