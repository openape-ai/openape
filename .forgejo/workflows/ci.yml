name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: docker
    # `--affected`: turbo runs each task only for packages changed vs main (+
    # their dependents). A leaf-package PR (e.g. sp-tasks) then skips every Nuxt
    # app build entirely → seconds, not 20 min on the 4-core runner. TURBO_SCM_BASE
    # + fetch-depth:0 give turbo the base ref to diff against.
    env:
      TURBO_SCM_BASE: origin/main
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure base ref for --affected
        # Guarantee origin/main is present so turbo can diff against it. Without
        # a resolvable base, --affected falls back to building everything.
        run: git fetch --no-tags origin main
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint · Typecheck · Test (affected)
        # e2e needs a running stack (dedicated job); docs prerenders OG images
        # (fragile, own deploy) — both excluded from per-PR CI.
        run: pnpm turbo run lint typecheck test --affected --filter='!openape-e2e' --filter='!docs'
      - name: Clean stale build output
        # Forgejo runners reuse their workspace between runs. A previous nuxt
        # build leaves apps/<app>/.output/server/node_modules with a recursive
        # vue→@vue/server-renderer→vue symlink cycle; the next nitro build
        # scandir's it and dies with ELOOP. Removing stale .output/.nuxt before
        # the build makes each run start clean (a fresh checkout builds fine).
        run: rm -rf apps/*/.output apps/*/.nuxt examples/*/.output examples/*/.nuxt
      - name: Build (affected)
        # Separate wave: nuxt build regenerates .nuxt/tsconfig.json, which would
        # race a concurrent nuxi prepare from the typecheck/test wave.
        # --concurrency=1 stays as a safety net for the rare PR that actually
        # touches several Nuxt apps at once (the 4-core runner thrashes and
        # SIGHUPs a build worker — exit 129 — when many build in parallel); with
        # --affected that case is now rare, so the cap costs almost nothing.
        run: pnpm turbo run build --affected --filter='!openape-e2e' --filter='!docs' --concurrency=1
