name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint · Typecheck · Test
        # e2e needs a running stack (dedicated job); docs prerenders OG images
        # (fragile, own deploy) — both excluded from per-PR CI.
        run: pnpm turbo run lint typecheck test --filter='!openape-e2e' --filter='!docs'
      - name: Build
        # Separate wave: nuxt build regenerates .nuxt/tsconfig.json, which races
        # a concurrent nuxi prepare from typecheck/test → TSConfckParseError.
        # Running build alone removes the concurrent writer.
        #
        # Retry once: the build occasionally dies on a transient runner signal
        # (exit 129/SIGHUP during a Nuxt app build) — not a code error, it passes
        # on rerun (the host has ample RAM, so it is not OOM). turbo's cache makes
        # the retry rebuild only the task that failed, so this stays fast.
        run: |
          pnpm turbo run build --filter='!openape-e2e' --filter='!docs' && exit 0
          echo "::warning::build wave failed (transient runner signal?) — retrying once"
          pnpm turbo run build --filter='!openape-e2e' --filter='!docs'
