name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: docker
    # `--affected`: turbo runs each task only for packages changed vs main (+
    # their dependents). A leaf-package PR (e.g. sp-tasks) then skips every Nuxt
    # app build entirely → seconds, not 20 min on the 4-core runner. TURBO_SCM_BASE
    # + fetch-depth:0 give turbo the base ref to diff against.
    env:
      TURBO_SCM_BASE: origin/main
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure base ref for --affected
        # Guarantee origin/main is present so turbo can diff against it. Without
        # a resolvable base, --affected falls back to building everything.
        run: git fetch --no-tags origin main
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint · Typecheck · Test (affected)
        # e2e needs a running stack (dedicated job); docs prerenders OG images
        # (fragile, own deploy) — both excluded from per-PR CI.
        run: pnpm turbo run lint typecheck test --affected --filter='!openape-e2e' --filter='!docs'
      - name: Build libs (affected)
        # Build ONLY the publishable libraries (packages + modules) — the things
        # other workspaces consume. Deployable apps (Nuxt) are intentionally NOT
        # built here:
        #   1. their full Nitro `.output` production build is a deploy-time
        #      concern — `pnpm run deploy:image` builds them, smoke-tests
        #      `/api/health`, health-gates the cutover and auto-rolls-back, so an
        #      app build break is caught before prod regardless;
        #   2. their code is already validated by the lint/typecheck/test wave;
        #   3. building the apps' Nitro output on the runner is what triggered the
        #      pnpm + Nitro `.output/server/node_modules` ELOOP symlink cycle
        #      (vue↔@vue/server-renderer; nuxt#30539 / #12012) — a known issue with
        #      no reliable pnpm-config fix — which forced admin-merges.
        # Scoping to libs makes CI deterministic and mirrors the pre-push hook's
        # build stage. (`docs` was already excluded for the same spirit.)
        run: pnpm turbo run build --affected --filter='./packages/*' --filter='./modules/*' --concurrency=1
