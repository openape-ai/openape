name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint · Typecheck · Test · Build
        # e2e needs a running stack (dedicated job, M4); docs build prerenders
        # OG images (fragile, has its own deploy) — both excluded from per-PR CI.
        run: pnpm turbo run lint typecheck test build --filter='!openape-e2e' --filter='!docs'
