# Prod compose for the four Nuxt apps on chatty — tested images from
# registry.openape.ai, packaged by compose/preview-package.Dockerfile and
# deployed by scripts/deploy-image.mjs (which also syncs this file to
# /home/openape/prod/docker-compose.yml).
#
# Design notes:
# - Each app mounts its existing /home/openape/projects/<app>/shared at the
#   IDENTICAL path and reuses the systemd-era shared/.env via env_file — the
#   absolute file:-SQLite URLs keep working and no secret is copied anywhere.
# - HOST is overridden to 0.0.0.0 (some .envs pin 127.0.0.1, which would bind
#   loopback INSIDE the container); `environment` wins over `env_file`.
# - Ports publish on 127.0.0.1:<port> — exactly where nginx already proxies,
#   so the nginx config is untouched by the systemd→container cutover.
# - user: 999:988 (openape) so DB/WAL files stay openape-owned and the dormant
#   systemd fallback could still take over.
# - Image tags are pinned via /home/openape/prod/.env (<APP>_TAG, managed by
#   the deployer; <APP>_TAG_PREV is the rollback pin).

name: openape-prod

services:
  idp:
    image: registry.openape.ai/openape-free-idp:${IDP_TAG:-unset}
    restart: unless-stopped
    user: "999:988"
    env_file: /home/openape/projects/openape-free-idp/shared/.env
    environment:
      HOST: 0.0.0.0
      NITRO_HOST: 0.0.0.0
    volumes:
      - /home/openape/projects/openape-free-idp/shared:/home/openape/projects/openape-free-idp/shared
    ports:
      - "127.0.0.1:3003:3003"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3003/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  troop:
    image: registry.openape.ai/openape-troop:${TROOP_TAG:-unset}
    restart: unless-stopped
    user: "999:988"
    env_file: /home/openape/projects/openape-troop/shared/.env
    environment:
      HOST: 0.0.0.0
      NITRO_HOST: 0.0.0.0
    volumes:
      - /home/openape/projects/openape-troop/shared:/home/openape/projects/openape-troop/shared
    ports:
      - "127.0.0.1:3010:3010"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3010/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  chat:
    image: registry.openape.ai/openape-chat:${CHAT_TAG:-unset}
    restart: unless-stopped
    user: "999:988"
    env_file: /home/openape/projects/openape-chat/shared/.env
    environment:
      HOST: 0.0.0.0
      NITRO_HOST: 0.0.0.0
    volumes:
      - /home/openape/projects/openape-chat/shared:/home/openape/projects/openape-chat/shared
    ports:
      - "127.0.0.1:3007:3007"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3007/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  org:
    image: registry.openape.ai/openape-org:${ORG_TAG:-unset}
    restart: unless-stopped
    user: "999:988"
    env_file: /home/openape/projects/openape-org/shared/.env
    environment:
      HOST: 0.0.0.0
      NITRO_HOST: 0.0.0.0
    volumes:
      - /home/openape/projects/openape-org/shared:/home/openape/projects/openape-org/shared
    ports:
      - "127.0.0.1:3020:3020"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3020/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
