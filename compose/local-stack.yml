      timeout: 3s
      retries: 30

  coder:
    build:
      context: ..
      dockerfile: compose/Nuxt.Dockerfile
      args:
        APP_FILTER: openape-coder
        APP_DIR: openape-coder
        PORT: "3030"
    image: openape-coder:local
    depends_on:
      proxy:
        condition: service_healthy
    dns:
      - 172.30.0.53
    volumes:
      - caddy-data:/caddy-data:ro
    environment:
      NUXT_OPENAPE_SP_CLIENT_ID: coder.openape.test
      NUXT_OPENAPE_SP_SP_NAME: OpenApe Coder
      NUXT_OPENAPE_SP_SESSION_SECRET: *session-secret
      NUXT_OPENAPE_SP_FALLBACK_IDP_URL: https://id.openape.test
      NUXT_PUBLIC_IDP_URL: https://id.openape.test
      NUXT_TURSO_URL: file:/tmp/openape-coder.db
      NODE_EXTRA_CA_CERTS: /caddy-data/caddy/pki/authorities/local/root.crt
      NITRO_PORT: "3030"
      HOST: 0.0.0.0
    networks:
      - openape-test
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3030/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Screenshot runner. Not started by `up` (demo profile); run on demand:
  #   docker compose -f compose/local-stack.yml run --rm playwright
  # Joins the network with dnsmasq as resolver, so the browser reaches the same
  # https://*.openape.test the apps do. Writes PNGs to docs/local-stack/screenshots.
  playwright:
    build:
      context: ..
      dockerfile: compose/demo/Dockerfile
    image: openape-demo-playwright:local
    profiles: ["demo"]
    depends_on:
      idp:
        condition: service_healthy
      troop:
        condition: service_healthy
      chat:
        condition: service_healthy
    dns:
      - 172.30.0.53
    volumes:
      # Stories write screenshots + the manifest under docs/local-stack/.
      - ../docs/local-stack:/demo/out
      # Live-mount the story scripts — iterate without an image rebuild.
      - ./demo:/demo/src:ro
    networks:
      - openape-test

  # --- Agent lifecycle (spawn / run / destroy) — profile: agent-lifecycle ---
  # Started by compose/agent/run.sh, not by a bare `up`.

  # Mock OpenAI-compatible LLM so the nest's agents have an endpoint WITHOUT a
  # ChatGPT subscription holder — a 2nd codex-proxy on a live account would
  # hard-terminate the first. See compose/mock-llm/server.mjs.
  mock-llm:
    build:
      context: ..
      dockerfile: compose/mock-llm/Dockerfile
    image: openape-mock-llm:local
    profiles: ["agent-lifecycle"]
    dns:
      - 172.30.0.53
    networks:
      - openape-test
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The nest daemon, bound to the LOCAL troop. HOST_ID + DEVICE_SECRET come from
  # `POST /api/nests/bind` — compose/agent/run.sh binds as demo@openape.test and
  # injects them. Agents it spawns register at the local IdP and use the mock LLM.
  nest:
    build:
      context: ..
      dockerfile: apps/openape-nest/Dockerfile
    image: openape-nest:latest
    profiles: ["agent-lifecycle"]
    depends_on:
      proxy:
        condition: service_healthy
      troop:
        condition: service_healthy
      mock-llm:
        condition: service_healthy
    dns:
      - 172.30.0.53
    volumes:
      - caddy-data:/caddy-data:ro
      - nest-data:/var/lib/openape/nest
    environment:
      OPENAPE_NEST_HOST_ID: ${OPENAPE_NEST_HOST_ID:-}
      OPENAPE_NEST_DEVICE_SECRET: ${OPENAPE_NEST_DEVICE_SECRET:-}
      OPENAPE_TROOP_WS_URL: wss://troop.openape.test
      # The var the agent bridge actually reads for its troop endpoint
      # (ape-agent bridge.ts readConfig). Without it the bridge defaults to
      # the PRODUCTION https://troop.openape.ai and its local-IdP-issued token
      # is meaningless there — the WS just hangs. Point it at the local troop.
      OPENAPE_TROOP_URL: https://troop.openape.test
      LITELLM_BASE_URL: http://mock-llm:4000/v1
      LITELLM_API_KEY: sk-mock
      APE_CHAT_BRIDGE_MODEL: gpt-5.5
      OPENAPE_BYPASS_APE_SHELL: "1"
      HOME: /var/lib/openape/nest
      NEST_DATA_DIR: /var/lib/openape/nest
      OPENAPE_NEST_REGISTRY_PATH: /var/lib/openape/nest/agents.json
      # The world-readable CA copy the entrypoint writes from the root-only
      # /caddy-data PKI — readable by the nest AND by spawned agent uids (the
      # bridge + sync), which the raw /caddy-data path is not.
      NODE_EXTRA_CA_CERTS: /var/lib/openape/local-ca.crt
    networks:
      - openape-test
