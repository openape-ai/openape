      timeout: 3s
      retries: 30

  pr:
    build:
      context: ..
      dockerfile: compose/Nuxt.Dockerfile
      args:
        APP_FILTER: "@openape-pr/app"
        APP_DIR: openape-pr
        PORT: "3014"
    image: openape-pr:local
    depends_on:
