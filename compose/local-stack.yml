# Local OpenApe test stack — the full web topology in containers, under real
# https://*.openape.test hostnames, mirroring chatty/prod.
#
#   docker compose -f compose/local-stack.yml up -d --build       # bring it up
#   docker compose -f compose/local-stack.yml run --rm playwright  # capture flows (M2)
#
# Dev-only secrets are inline below — this stack is local and ephemeral.

name: openape-test

x-dev-secret: &session-secret dev-session-secret-openape-test-0001

networks:
  openape-test:
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  caddy-data:
  nest-data:

services:
  # Local DNS: serves the DDISA discovery TXT for openape.test and forwards the
  # rest (incl. *.openape.test A records via the proxy's aliases) to docker DNS.
  dns:
    build:
      context: ..
      dockerfile: compose/dns.Dockerfile
    image: openape-dns:local
    networks:
      openape-test:
        ipv4_address: 172.30.0.53

  # TLS terminator + host-routing reverse proxy. tls internal → local CA, shared
  # to the app containers via caddy-data so their Node https calls trust it.
  proxy:
    image: caddy:2
    depends_on:
      - dns
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks:
      openape-test:
        aliases:
          - id.openape.test
          - troop.openape.test
          - chat.openape.test
          - coder.openape.test
          - tasks.openape.test
          - plans.openape.test
          - testrun.openape.test
          - timetrack.openape.test
          - pr.openape.test
          - docs.openape.test
    ports:
      - "127.0.0.1:443:443"
    healthcheck:
      # 127.0.0.1, not localhost — Caddy's admin API binds IPv4-only and
      # `localhost` resolves to ::1 first inside the container.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
      interval: 5s
      timeout: 3s
      retries: 20

  idp:
    build:
      context: ..
      dockerfile: compose/Nuxt.Dockerfile
      args:
        APP_FILTER: openape-free-idp
        APP_DIR: openape-free-idp
        PORT: "3003"
    image: openape-free-idp:local
    depends_on:
      proxy:
        condition: service_healthy
    dns:
      - 172.30.0.53
    volumes:
      - caddy-data:/caddy-data:ro
    environment:
      # These are nuxt-auth-idp module runtimeConfig keys (configKey openapeIdp),
      # so the runtime-override env names are NUXT_OPENAPE_IDP_* — the plain
      # NUXT_OPENAPE_* names are only read at BUILD time and would bake defaults.
      NUXT_OPENAPE_IDP_ISSUER: https://id.openape.test
      NUXT_OPENAPE_IDP_RP_ID: id.openape.test
      NUXT_OPENAPE_IDP_RP_ORIGIN: https://id.openape.test
      NUXT_OPENAPE_IDP_RP_HOST_ALLOW_LIST: id.openape.test
      NUXT_OPENAPE_IDP_SESSION_SECRET: *session-secret
      NUXT_OPENAPE_IDP_MANAGEMENT_TOKEN: dev-management-token
      # Permissive: accept a host-derived SP client_id by fetching its
      # /.well-known/oauth-client-metadata (mirrors id.openape.ai) instead of
      # requiring pre-registration.
      NUXT_OPENAPE_IDP_SP_METADATA_MODE: permissive
      # All app/browser traffic reaches the IdP through the Caddy proxy, so the
      # rate-limiter's socket peer is always the proxy — without this it keys
      # the per-IP auth cap on one IP for the whole stack (a global 10/min that
      # the lifecycle test's auth burst trips). Trusting the proxy makes it walk
      # X-Forwarded-For to the real client. Injected by compose/agent/run.sh
      # (the proxy's container IP is dynamic); empty in a bare `up`, which is
      # fine for the screenshot flows that don't burst auth.
      OPENAPE_RATE_LIMIT_TRUSTED_PROXIES: ${OPENAPE_RATE_LIMIT_TRUSTED_PROXIES:-}
      # One headless browser walks every app's SSO + account flow within a
      # minute — since the #462 recovery stories that's legitimately more
      # than the audited 10/min default (each /account visit alone costs two
      # rate-limited calls). Raise the cap locally instead of disabling the
      # limiter; prod keeps the default.
      OPENAPE_RATE_LIMIT_MAX_AUTH: "120"
      # Register the apes CLI as a public client (RFC 8252 loopback redirect),
      # exactly as id.openape.ai does in prod — so `apes login`'s PKCE flow
      # (client_id=apes-cli, redirect_uri=http://localhost:9876/callback)
      # resolves. The agent-lifecycle test drives this flow headlessly to
      # provision an owner login into the nest.
      NUXT_OPENAPE_IDP_PUBLIC_CLIENTS: '{"apes-cli":{"client_id":"apes-cli","redirect_uris":["http://localhost:9876/callback"]}}'
      NUXT_TURSO_URL: file:/app/idp.db
      NODE_EXTRA_CA_CERTS: /caddy-data/caddy/pki/authorities/local/root.crt
      NITRO_PORT: "3003"
      HOST: 0.0.0.0
    networks:
      - openape-test
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3003/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30

  troop:
    build:
      context: ..
      dockerfile: compose/Nuxt.Dockerfile
      args:
        APP_FILTER: "@openape/troop"
        APP_DIR: openape-troop
        PORT: "3010"
    image: openape-troop:local
    depends_on:
      proxy:
        condition: service_healthy
    dns:
      - 172.30.0.53
    volumes:
      - caddy-data:/caddy-data:ro
    environment:
      # nuxt-auth-sp module runtimeConfig (configKey openapeSp) → NUXT_OPENAPE_SP_*.
      # client_id = this SP's own https host, so the IdP fetches its local
      # /.well-known/oauth-client-metadata. No openapeUrl → real DDISA discovery.
      NUXT_OPENAPE_SP_CLIENT_ID: troop.openape.test
      NUXT_OPENAPE_SP_SP_NAME: OpenApe Troop
      NUXT_OPENAPE_SP_SESSION_SECRET: *session-secret
      NUXT_OPENAPE_SP_FALLBACK_IDP_URL: https://id.openape.test
      NUXT_PUBLIC_IDP_URL: https://id.openape.test
      NODE_EXTRA_CA_CERTS: /caddy-data/caddy/pki/authorities/local/root.crt
      NITRO_PORT: "3010"
      HOST: 0.0.0.0
    networks:
      - openape-test
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3010/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30

  chat:
    build:
      context: ..
      dockerfile: compose/Nuxt.Dockerfile
      args:
        APP_FILTER: "@openape/chat"
        APP_DIR: openape-chat
        PORT: "3007"
    image: openape-chat:local
    depends_on:
      proxy:
        condition: service_healthy
    dns:
      - 172.30.0.53
    volumes:
      - caddy-data:/caddy-data:ro
    environment:
      NUXT_OPENAPE_SP_CLIENT_ID: chat.openape.test
      NUXT_OPENAPE_SP_SP_NAME: OpenApe Chat
      NUXT_OPENAPE_SP_SESSION_SECRET: *session-secret
      NUXT_OPENAPE_SP_FALLBACK_IDP_URL: https://id.openape.test
      NUXT_PUBLIC_IDP_URL: https://id.openape.test
      NODE_EXTRA_CA_CERTS: /caddy-data/caddy/pki/authorities/local/root.crt
      NITRO_PORT: "3007"
      HOST: 0.0.0.0
    networks:
      - openape-test
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3007/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Remaining DDISA SP apps — same shape as troop/chat (Nuxt build, SP module
  # config, local-CA trust). Each defaults to an ephemeral in-container LibSQL
  # file DB (migrations run on boot), like prod's per-app shared DB.
  tasks:
    build:
      context: ..
      dockerfile: compose/Nuxt.Dockerfile
      args:
        APP_FILTER: "@openape-tasks/app"
        APP_DIR: openape-tasks
        PORT: "3005"
    image: openape-tasks:local
    depends_on:
      proxy:
        condition: service_healthy
    dns:
      - 172.30.0.53
    volumes:
      - caddy-data:/caddy-data:ro
    environment:
      NUXT_OPENAPE_SP_CLIENT_ID: tasks.openape.test
      NUXT_OPENAPE_SP_SP_NAME: OpenApe Tasks
      NUXT_OPENAPE_SP_SESSION_SECRET: *session-secret
      NUXT_OPENAPE_SP_FALLBACK_IDP_URL: https://id.openape.test
      NUXT_PUBLIC_IDP_URL: https://id.openape.test
      NODE_EXTRA_CA_CERTS: /caddy-data/caddy/pki/authorities/local/root.crt
      NITRO_PORT: "3005"
      HOST: 0.0.0.0
    networks:
      - openape-test
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3005/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30

  plans:
    build:
      context: ..
      dockerfile: compose/Nuxt.Dockerfile
      args:
        APP_FILTER: "@openape-plans/app"
        APP_DIR: openape-plans
        PORT: "3004"
    image: openape-plans:local
    depends_on:
      proxy:
        condition: service_healthy
    dns:
      - 172.30.0.53
    volumes:
      - caddy-data:/caddy-data:ro
    environment:
      NUXT_OPENAPE_SP_CLIENT_ID: plans.openape.test
      NUXT_OPENAPE_SP_SP_NAME: OpenApe Plans
      NUXT_OPENAPE_SP_SESSION_SECRET: *session-secret
      NUXT_OPENAPE_SP_FALLBACK_IDP_URL: https://id.openape.test
      NUXT_PUBLIC_IDP_URL: https://id.openape.test
      NODE_EXTRA_CA_CERTS: /caddy-data/caddy/pki/authorities/local/root.crt
      NITRO_PORT: "3004"
      HOST: 0.0.0.0
    networks:
      - openape-test
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3004/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30

  testrun:
    build:
      context: ..
      dockerfile: compose/Nuxt.Dockerfile
      args:
        APP_FILTER: "@openape-testrun/app"
        APP_DIR: openape-testrun
        PORT: "3006"
    image: openape-testrun:local
    depends_on:
      proxy:
        condition: service_healthy
    dns:
      - 172.30.0.53
    volumes:
      - caddy-data:/caddy-data:ro
    environment:
      NUXT_OPENAPE_SP_CLIENT_ID: testrun.openape.test
      NUXT_OPENAPE_SP_SP_NAME: OpenApe Testrun
      NUXT_OPENAPE_SP_SESSION_SECRET: *session-secret
      NUXT_OPENAPE_SP_FALLBACK_IDP_URL: https://id.openape.test
      NUXT_PUBLIC_IDP_URL: https://id.openape.test
      NODE_EXTRA_CA_CERTS: /caddy-data/caddy/pki/authorities/local/root.crt
      NITRO_PORT: "3006"
      HOST: 0.0.0.0
    networks:
      - openape-test
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3006/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30

  timetrack:
    build:
      context: ..
      dockerfile: compose/Nuxt.Dockerfile
      args:
        APP_FILTER: "@openape-timetrack/app"
        APP_DIR: openape-timetrack
        PORT: "3011"
    image: openape-timetrack:local
    depends_on:
      proxy:
        condition: service_healthy
    dns:
      - 172.30.0.53
    volumes:
      - caddy-data:/caddy-data:ro
    environment:
      NUXT_OPENAPE_SP_CLIENT_ID: timetrack.openape.test
      NUXT_OPENAPE_SP_SP_NAME: OpenApe Timetrack
      NUXT_OPENAPE_SP_SESSION_SECRET: *session-secret
      NUXT_OPENAPE_SP_FALLBACK_IDP_URL: https://id.openape.test
      NUXT_PUBLIC_IDP_URL: https://id.openape.test
      NODE_EXTRA_CA_CERTS: /caddy-data/caddy/pki/authorities/local/root.crt
      NITRO_PORT: "3011"
      HOST: 0.0.0.0
    networks:
