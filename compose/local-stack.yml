      interval: 5s
      timeout: 3s
      retries: 30

  # Public docs site (no DDISA SP auth). @nuxt/content runs on libsql (not
  # better-sqlite3), so it builds/runs in the shared Nuxt container like the
  # rest — the runtime stage already pins the libsql native binding.
  docs:
    build:
      context: ..
      dockerfile: compose/Nuxt.Dockerfile
      args:
        APP_FILTER: docs
        APP_DIR: docs
        PORT: "3015"
    image: openape-docs:local
    depends_on:
      proxy:
        condition: service_healthy
    dns:
      - 172.30.0.53
    volumes:
      - caddy-data:/caddy-data:ro
    environment:
      NODE_EXTRA_CA_CERTS: /caddy-data/caddy/pki/authorities/local/root.crt
      NITRO_PORT: "3015"
      HOST: 0.0.0.0
