# Local DNS for the openape.test test stack.
#
# Two jobs:
#  1. Serve the DDISA discovery TXT record for the test domain, so SPs perform
#     the REAL DNS-based discovery (resolveTxt on the email domain) instead of an
#     NUXT_OPENAPE_URL override.
#  2. Forward everything else (incl. A-lookups for id|troop|chat.openape.test,
#     which the proxy carries as docker network aliases) to docker's embedded
#     DNS at 127.0.0.11, so service-name + alias resolution keeps working.

# Don't read the container's /etc/resolv.conf — we set the upstream explicitly.
no-resolv
# Forward all non-local queries to docker's embedded resolver.
server=127.0.0.11

# DDISA discovery record. The resolver queries `_ddisa.{domain}` (DDISA spec)
# and parses `v=ddisa1 idp=<url>; mode=<mode>` (note: a SPACE between v and idp,
# then `; ` separators). Both the SP (discovery → learns the IdP) and the IdP
# (authorize → reads `mode` for the consent policy) read this one record.
# mode=allowlist-user → the IdP shows the consent screen once, then remembers it.
txt-record=_ddisa.openape.test,v=ddisa1 idp=https://id.openape.test; mode=allowlist-user

# Agents are provisioned under the IdP HOST (issuer-host-derived email, e.g.
# `name-hash+owner@id.openape.test`), so the IdP host needs its OWN discovery
# record or those agent identities aren't DDISA-resolvable. Production mirrors
# this: `_ddisa.id.openape.ai` and `_ddisa.id.openape.at` both exist alongside
# the base-domain records. Same IdP, so identical idp= target.
txt-record=_ddisa.id.openape.test,v=ddisa1 idp=https://id.openape.test; mode=allowlist-user

# Quieter logs; flip to log-queries when debugging discovery.
log-facility=-
