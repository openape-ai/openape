model_list:
  # Default path (/v1) serves the self-hosted headwai LocalCore models. The named
  # delta-mind/* group still hits codex (ChatGPT sub) via the M3 path. lindeverlag
  # is retired — its codex group + upstream were removed.
  - model_name: LocalCore-Instant
    litellm_params: { model: openai/LocalCore-Instant, api_base: https://iurio-prod.my-ki.at/api/v1, api_key: os.environ/HEADWAI_API_KEY }
  - model_name: LocalCore-Thinking
    litellm_params: { model: openai/LocalCore-Thinking, api_base: https://iurio-prod.my-ki.at/api/v1, api_key: os.environ/HEADWAI_API_KEY }
  # Named account: delta-mind (M3 path /<owner>/delta-mind/v1)
  - model_name: delta-mind/gpt-5.5
    litellm_params: { model: openai/gpt-5.5, api_base: http://codex-proxy-dm:4000/v1, api_key: codex-proxy-no-auth }
  - model_name: delta-mind/gpt-5.4
    litellm_params: { model: openai/gpt-5.4, api_base: http://codex-proxy-dm:4000/v1, api_key: codex-proxy-no-auth }
  - model_name: delta-mind/gpt-5.4-mini
    litellm_params: { model: openai/gpt-5.4-mini, api_base: http://codex-proxy-dm:4000/v1, api_key: codex-proxy-no-auth }
  - model_name: delta-mind/gpt-5.3-codex
    litellm_params: { model: openai/gpt-5.3-codex, api_base: http://codex-proxy-dm:4000/v1, api_key: codex-proxy-no-auth }
  # Named account: headwai (M3 path /<owner>/headwai/v1) - self-hosted vLLM via iurio Open WebUI (api-key, not codex)
  - model_name: headwai/LocalCore-Instant
    litellm_params: { model: openai/LocalCore-Instant, api_base: https://iurio-prod.my-ki.at/api/v1, api_key: os.environ/HEADWAI_API_KEY }
  - model_name: headwai/LocalCore-Thinking
    litellm_params: { model: openai/LocalCore-Thinking, api_base: https://iurio-prod.my-ki.at/api/v1, api_key: os.environ/HEADWAI_API_KEY }
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  custom_auth: ddisa_auth.user_api_key_auth
litellm_settings:
  callbacks: ["ddisa_auth.proxy_handler_instance"]
  drop_params: true
router_settings:
  disable_cooldowns: true
  num_retries: 3
  timeout: 600
