name: Bug Report
description: Report something that's broken
labels: ["bug"]
body:
  - type: input
    id: command
    attributes:
      label: Command / Route
      description: What command, API route, or UI action triggers the bug?
      placeholder: "apes grants revoke"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
  - type: input
    id: packages
    attributes:
      label: Affected packages
      placeholder: "packages/apes, modules/nuxt-auth-idp"
