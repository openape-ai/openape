name: security
# Standalone security audit. Catches advisories newly published against
# the *frozen* main lockfile — the inline ci.yml audit only fires on
# push/PR, so a quiet branch could sit on a CVE indefinitely. Mirrors
# the openape-ai/escapes `security` workflow setup.
on:
  schedule:
    # Mondays 06:00 UTC (~07/08:00 CEST). Runs once a week so a fresh
    # advisory surfaces within ~7 days even if no one pushes.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit production deps (high+ fails the run)
        run: pnpm audit --prod --audit-level=high
      - name: Audit including dev deps (moderate+, advisory-only)
        # Dev-dep advisories don't block — they get reported as a
        # GitHub annotation so we see them in the run summary without
        # gating the workflow on tools (vitest, eslint, ...) that never
        # ship to users.
        if: always()
        run: |
          pnpm audit --audit-level=moderate \
            || echo "::warning::Audit (incl. dev-deps) found advisories - review the job summary."
