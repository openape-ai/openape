name: ci
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build packages + modules, then prepare Nuxt types for module playgrounds and apps
        run: |
          pnpm turbo run build --filter='./packages/*' --filter='./modules/*' --concurrency=4
          for mod in modules/nuxt-auth-idp modules/nuxt-auth-sp; do
            [ -d "$mod/playground" ] && (cd "$mod" && npx nuxi prepare playground) || true
          done
          for app in apps/openape-free-idp apps/openape-agent-mail apps/openape-agent-proxy apps/service; do
            [ -f "$app/package.json" ] && (cd "$app" && npx nuxi prepare) || true
          done
      - name: Security audit
        run: pnpm audit --audit-level=critical || echo "::warning::Security audit found vulnerabilities. Run 'pnpm audit' locally for details."
      - run: pnpm turbo run lint typecheck test --filter='./packages/*' --filter='./modules/*' --filter='./apps/*' --concurrency=4
