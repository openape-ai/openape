name: Deploy docs.openape.ai

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'scripts/deploy-docs.sh'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CHATTY_HOST: chatty

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.CHATTY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.CHATTY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "$SSH_KEY" > ~/.ssh/chatty
          chmod 600 ~/.ssh/chatty
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host chatty
            HostName chatty.delta-mind.at
            User openape
            IdentityFile ~/.ssh/chatty
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Capture previous release (for rollback)
        id: prev
        run: |
          PREV=$(ssh chatty "readlink /home/openape/projects/docs/current 2>/dev/null" || echo "")
          echo "release=$PREV" >> "$GITHUB_OUTPUT"
          echo "Previous release: ${PREV:-<none>}"

      - name: Deploy
        run: ./scripts/deploy-docs.sh

      - name: Public HTTPS health check
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            BODY=$(curl -fsS https://docs.openape.ai/ 2>/dev/null || echo "")
            if echo "$BODY" | grep -q '<title>'; then
              TITLE=$(echo "$BODY" | grep -oE '<title>[^<]+' | head -1)
              echo "https://docs.openape.ai/ returned 200 — $TITLE"
              exit 0
            fi
            echo "attempt $i: no title yet, retrying..."
            sleep 3
          done
          echo "public health check failed after 5 attempts"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.prev.outputs.release != ''
        env:
          PREV_RELEASE: ${{ steps.prev.outputs.release }}
        run: |
          set -euo pipefail
          if [[ ! "$PREV_RELEASE" =~ ^/home/openape/projects/docs/releases/[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "refusing to roll back to unexpected path: $PREV_RELEASE"
            exit 1
          fi
          echo "Rolling back to $PREV_RELEASE"
          ssh chatty "ln -sfn $PREV_RELEASE /home/openape/projects/docs/current && sudo systemctl reload nginx"
          echo "rollback complete"
