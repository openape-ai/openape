name: deploy
on:
  push:
    branches: [main]
    paths: ['apps/**', 'modules/**', 'packages/**']
  workflow_dispatch:
    inputs:
      app:
        description: 'App to deploy (all, service, free-idp, agent-mail, agent-proxy)'
        required: false
        default: 'all'
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.filter.outputs.service }}
      free-idp: ${{ steps.filter.outputs.free-idp }}
      agent-mail: ${{ steps.filter.outputs.agent-mail }}
      agent-proxy: ${{ steps.filter.outputs.agent-proxy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            service:
              - 'apps/service/**'
              - 'packages/**'
              - 'modules/**'
            free-idp:
              - 'apps/openape-free-idp/**'
              - 'packages/**'
              - 'modules/**'
            agent-mail:
              - 'apps/openape-agent-mail/**'
              - 'packages/**'
              - 'modules/**'
            agent-proxy:
              - 'apps/openape-agent-proxy/**'
              - 'packages/**'
              - 'modules/**'

  deploy-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.service == 'true' || github.event.inputs.app == 'all' || github.event.inputs.app == 'service'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx vercel --prod --yes
        working-directory: apps/service
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SERVICE_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy-free-idp:
    needs: detect-changes
    if: needs.detect-changes.outputs.free-idp == 'true' || github.event.inputs.app == 'all' || github.event.inputs.app == 'free-idp'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx vercel --prod --yes
        working-directory: apps/openape-free-idp
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FREEIDP_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy-agent-mail:
    needs: detect-changes
    if: needs.detect-changes.outputs.agent-mail == 'true' || github.event.inputs.app == 'all' || github.event.inputs.app == 'agent-mail'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx vercel --prod --yes
        working-directory: apps/openape-agent-mail
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_AGENTMAIL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy-agent-proxy:
    needs: detect-changes
    if: needs.detect-changes.outputs.agent-proxy == 'true' || github.event.inputs.app == 'all' || github.event.inputs.app == 'agent-proxy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx vercel --prod --yes
        working-directory: apps/openape-agent-proxy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_AGENTPROXY_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
