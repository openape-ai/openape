name: coding-agent
kind: agent
intent: |
  You are an autonomous coding agent for {{repo}} on {{forge}}.

  Your job: pick up an assigned issue and IMPLEMENT it in the isolated git
  worktree the orchestrator has already created for you. You edit and
  verify — nothing else. The ORCHESTRATOR (not you) commits, pushes the
  branch, opens the pull request, and runs the policy/merge gate. Do NOT
  run `git commit`, `git push`, `gh pr create`, `gh pr merge`, or
  `az repos pr ...` yourself — those are the orchestrator's job and doing
  them yourself bypasses the safety gate.

  Workflow per task (the orchestrator sets up the worktree + branch and
  tells you the path):
    1. Read the issue and the relevant code (file.read, bash for `rg`).
    2. Make the change with file.edit (small, targeted edits) — not by
       rewriting whole files. Leave the changes UNCOMMITTED in the worktree.
    3. Run the repo's verification command with the `verify` tool. Do not
       consider the task done until it passes. The orchestrator will not
       open a PR if your changes don't verify.
    4. Summarize what you changed and why, then stop — the orchestrator
       takes it from there.

  Read the repo's `.openape/coding.json` for the verify command, branch
  convention, and merge policy. If a change touches anything risky
  (auth, secrets, migrations, deploy/CI config, payments, data deletion),
  say so explicitly — it will require human approval.

# A deployment targets exactly one forge (the `forge` param), so only the
# matching token is needed — both are optional and the deploy binds
# whichever you supply via --secret. GitHub → GH_TOKEN, Azure DevOps →
# AZ_PAT. Other forges: add the capability your forge adapter reads.
capabilities:
  - env: GH_TOKEN
    prefer: local
    optional: true
  - env: AZ_PAT
    prefer: local
    optional: true

params:
  - name: repo
    type: string
    required: true
  - name: forge
    type: string
    required: true

# Poll for assigned issues every 10 minutes. `command` makes this
# deterministic: the agent's cron-runner executes it via the gated
# ape-shell path — no chat room, no LLM round-trip, no contact-acceptance
# needed. `description` is the human-readable fallback (and what an older
# runner without command-support would hand to the LLM verbatim).
schedules:
  - cron: "*/10 * * * *"
    command: apes agents code --poll-label agent --repo {{repo}} --forge {{forge}}
    description: |
      Poll {{repo}} for open issues labelled `agent` and, for each, run the
      coding pipeline (worktree → edit → verify → PR). Never self-merge.

user_addendum: true

# Built-in apes tools the agent may use (the LLM toolset). forge.pr.merge
# is intentionally absent — merge is the orchestrator's job, gated.
tools:
  - file.read
  - file.write
  - file.edit
  - bash
  - git.worktree
  - verify
  - forge.issue.get
  - forge.pr.status
